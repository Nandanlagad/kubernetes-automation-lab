name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:

  docker-build:

    runs-on: ubuntu-latest

    environment: prod

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t nandanlagad/kubernetes-automation-lab:v1.0.0 \
          -t nandanlagad/kubernetes-automation-lab:latest \
          .

      - name: Push Version Tag
        run: |
          docker push nandanlagad/kubernetes-automation-lab:v1.0.0

      - name: Push Latest Tag
        run: |
          docker push nandanlagad/kubernetes-automation-lab:latest